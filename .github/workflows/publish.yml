name: Publish

permissions:
  contents: read
  id-token: write

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup NodeJS 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Publish universal-cookie to NPM
        working-directory: ./packages/universal-cookie
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "universal-cookie@$VERSION" version >/dev/null 2>&1; then
            echo "universal-cookie@$VERSION already published, skipping"
          else
            npm publish --provenance --access public
          fi

      - name: Publish react-cookie to NPM
        working-directory: ./packages/react-cookie
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "react-cookie@$VERSION" version >/dev/null 2>&1; then
            echo "react-cookie@$VERSION already published, skipping"
          else
            npm publish --provenance --access public
          fi

      - name: Publish universal-cookie-express to NPM
        working-directory: ./packages/universal-cookie-express
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "universal-cookie-express@$VERSION" version >/dev/null 2>&1; then
            echo "universal-cookie-express@$VERSION already published, skipping"
          else
            npm publish --provenance --access public
          fi

      - name: Publish universal-cookie-koa to NPM
        working-directory: ./packages/universal-cookie-koa
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "universal-cookie-koa@$VERSION" version >/dev/null 2>&1; then
            echo "universal-cookie-koa@$VERSION already published, skipping"
          else
            npm publish --provenance --access public
          fi
